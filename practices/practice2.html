<!DOCTYPE html>
<html>
  <head>
    <style>
      .box1 {
        margin-top: 100px;
        vertical-align: middle;
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.25);
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 10px;
        padding-right: 30px;
        display: inline-block;
        border-radius: 10px;
      }
      p {
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
        color: rgb(100, 100, 100);
      }

      .email {
        font-size: 16px;
        margin-bottom: 10px;
      }

      .searchbar {
        font-size: 16px;
        width: 400px;
        border-width: 2px;
        border-style: solid;
        border-color: rgb(100, 100, 100);
        padding-top: 7px;
        padding-bottom: 7px;
        border-radius: 5px;
        margin-bottom: 20px;
      }

      .agree {
        margin-bottom: 20px;
        font-size: 16px;
      }

      .button {
        background-color: rgb(10, 102, 194);
        color: white;
        border: none;
        font-size: 20px;
        width: 400px;
        padding-top: 16px;
        padding-bottom: 16px;
        border-radius: 30px;
      }

      .image {
        width: 50px;
        height: 50px;
        display: inline-block;
        border-radius: 25px;
        vertical-align: middle;
        object-fit: cover;
        margin-right: 5px;
      }

      .another-searchbar {
        border: none;
        width: 300px;
        font-size: 18px;
        vertical-align: middle;
      }

      .tweet {
        background-color: rgb(29, 155, 240);
        color: white;
        border: none;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        vertical-align: middle;
        cursor: pointer;
      }

      .tweet:hover {
        opacity: 0.8;
      }

      .tweet:active {
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
   <div class="box">
    <p class="email">Email</p>

    <input class="searchbar" type="text">

    <p class="agree">
      By clicking Agree & Join, you agree to the Privacy Policy.
    </p>

    <button class="button">
      Agree & Join
    </button>
   </div>
   <div class="box1">
    <img class="image" src="https://plus.unsplash.com/premium_photo-1667030474693-6d0632f97029?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8Y2F0fGVufDB8fDB8fHww">
    <input class="another-searchbar" type="text" placeholder="What's happening?">
    <button class="tweet">Tweet</button>
   </div> 
  </body>
</html>
